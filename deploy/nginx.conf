# Aidara Mobile PWA — Nginx configuration
# Domain: aidara-mobile.bogorkab.go.id (adjust as needed)
# Document root: /var/www/aidara/mobile/dist

server {
    listen 80;
    listen [::]:80;
    server_name aidara-mobile.bogorkab.go.id;

    # Redirect HTTP → HTTPS (uncomment after SSL is configured)
    # return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aidara-mobile.bogorkab.go.id;

    root /var/www/aidara/mobile/dist;
    index index.html;

    # SSL — update paths after certbot / manual cert setup
    ssl_certificate     /etc/letsencrypt/live/aidara-mobile.bogorkab.go.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aidara-mobile.bogorkab.go.id/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Brotli (if ngx_brotli module is installed)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # index.html — no cache (PWA update detection)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # Service worker & manifest — no cache
    location ~* (sw\.js|workbox-.*\.js|manifest\.webmanifest)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # Hashed static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback — all routes → index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
